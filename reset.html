{% extends "base.html" %}

{% block title %}
reset password
{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh; background: #f4f6f9;">

    <div class="card shadow-lg border-0 rounded-4" style="width: 100%; max-width: 400px;">
        <div class="card-body p-4">

            <!-- Title -->
            <h4 class="text-center mb-3 fw-bold">Reset Password</h4>
            <p class="text-center text-muted small mb-4">
                Enter a new password for your account.
            </p>

            <!-- Form -->
            <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
                
                <!-- New Password -->
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input 
                        type="password" 
                        name="password" 
                        class="form-control rounded-3" 
                        placeholder="Enter new password"
                        required
                    >
                </div>

                <!-- Confirm Password -->
                <div class="mb-3">
                    <label class="form-label">Confirm Password</label>
                    <input 
                        type="password" 
                        name="password1" 
                        class="form-control rounded-3" 
                        placeholder="Confirm new password"
                        required
                    >
                </div>

                <!-- Submit -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary rounded-3">
                        Reset Password
                    </button>
                </div>

            </form>

            <!-- Divider -->
            <hr class="my-4">

            <!-- Back to Login -->
            <div class="text-center">
                <a href="{{ url_for('auth.login') }}" class="text-decoration-none small">
                    ← Back to Login
                </a>
            </div>

        </div>
    </div>

</div>
{% endblock %}

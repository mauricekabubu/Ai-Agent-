{% extends "base.html" %}

{% block title %}
Register Page
{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height:90vh;">

```
    <div class="register-card p-4 shadow" style="width:500px; border-radius:15px; background:white;">

        <div class="text-center mb-4">
            <h2 class="text-success">🌱 FarmHub</h2>
            <p class="text-muted">Create your FarmHub account</p>
        </div>

        <form method="POST" action="{{url_for('auth.register')}}" enctype="multipart/form-data">

            <!-- Full Name -->
            <div class="form-group">
                <label>Full Names</label>
                <input type="text" name="full_names" class="form-control" placeholder="Enter full names" required>
            </div>

            <!-- Username -->
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" class="form-control" placeholder="Enter email address" required>
            </div>

            <!-- Phone -->
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" class="form-control" placeholder="Enter phone number" required>
            </div>

            <!-- Role -->
            <div class="form-group">
                <label>Select Role</label>
                <select name="role" class="form-control" required>
                    <option value="">Choose role</option>
                    <option value="farmer">Farmer</option>
                    <option value="specialist">Agriculture Specialist</option>
                    <option value="customer">Customer / Buyer</option>
                </select>
            </div>

            <!-- Location -->
            <div class="form-group">
                <label>Location</label>
                <input type="text" name="location" class="form-control" placeholder="Enter your location" required>
            </div>

            <!-- Profile Image -->
            <div class="form-group">
                <label>Profile Image</label>
                <input type="file" name="profile_img" class="form-control">
            </div>

            <!-- Date -->
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" class="form-control" required>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create password" required>
            </div>

            <button type="submit" class="btn btn-success btn-block mt-3">
                Create Account
            </button>

            <div class="text-center mt-3">
                Already have an account?
                <a href="{{url_for('auth.login')}}">Login</a>
            </div>

        </form>

    </div>
    ```
</div>

{% endblock %}

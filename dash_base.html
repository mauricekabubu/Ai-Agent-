<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{url_for('static',filename='dash.css')}}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>FarmHub Dashboard</title>

</head>

<body>
    <!-- Flashed Messages -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 1100;">
        {% with messages = get_flashed_messages(with_categories=true) %} {% if messages %} {% for category, message in messages %}
        <div class="toast align-items-center border-0 toast-{{ category }}" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="3000">
            <div class="d-flex">
                <div class="toast-body">
                    {{ message }}
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
        {% endfor %} {% endif %} {% endwith %}
    </div>
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="logo d-flex justify-content-between align-items-center">
            <span>🌱 <span class="logo-text">FarmHub</span></span>
            <button id="toggleBtn" class="toggle-btn">
                <i class="bi bi-list"></i>
            </button>
        </div>

        <a href="{{url_for('farmer_dash')}}">
            <i class="bi bi-speedometer2"></i>
            <span>Quick Stats</span>
        </a>

        <a href="{{url_for('market_farm')}}">
            <i class="bi bi-shop"></i>
            <span>Markets</span>
        </a>

        <a href="{{url_for('farmhub_ai')}}">
            <i class="bi bi-robot"></i>
            <span>FarmHub AI</span>
        </a>

        <a href="{{url_for('communities')}}">
            <i class="bi bi-people"></i>
            <span>Communities</span>
        </a>

        <a href="{{url_for('inbox')}}">
            <i class="bi bi-inbox"></i>
            <span>Inbox</span>
        </a>

        <hr style="color: white" />

        <a href="{{url_for('auth.logout')}}">
            <i class="bi bi-box-arrow-right"></i>
            <span>Logout</span>
        </a>
    </div>

    

    <div id="content" class="content">
        {% block content %}{% endblock %}
    </div>
    
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>

</html>

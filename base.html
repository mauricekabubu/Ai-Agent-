<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Base page </title>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow-sm py-2">
        <div class="container">

            <!-- Brand -->
            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
                Farmhub 🌽
            </a>

            <!-- Toggler -->
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Centered Nav -->
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav gap-3">

                    <li class="nav-item">
                        <a class="nav-link px-3" href="{{url_for('index')}}">
                            <i class="fa-solid fa-house me-1"></i> Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link px-3" href="{{url_for('about')}}">
                            <i class="fa-solid fa-question me-1"></i> About
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link px-3" href="{{ url_for('blog') }}">
                            <i class="fa-solid fa-face-smile me-1"></i> Blog
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link px-3" href="{{ url_for('contact') }}">
                            <i class="fa-solid fa-phone me-1"></i> Contact
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link px-3" href="{{url_for('auth.login')}}">
                            <i class="fa-solid fa-user me-1"></i> Login
                        </a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    <!-- Get Flashed messages -->
     <!-- Toast container -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index: 1100;">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="toast align-items-center border-0 toast-{{ category }}" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true" data-bs-delay="3000">
                        <div class="d-flex">
                            <div class="toast-body">
                                {{ message }}
                            </div>
                            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                        </div>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        // Initialize all toasts
        const toastElList = document.querySelectorAll('.toast');
        toastElList.forEach(function(toastEl) {
            const toast = new bootstrap.Toast(toastEl);
            toast.show();
        });
    </script>

    {% block content %}
    {% endblock %}

<script>
    const li = document.querySelectorAll('.nav-link');

    function changecolor(){
        li.forEach((item) => {
            item.addEventListener('mouseover', function() {
                li.forEach((i) => i.classList.remove('active'));
                this.style.color = "magenta";
                this.classList.add('active');
            });
        });
    }

    changecolor();

    const btn = document.querySelector('.btn-primary');

    btn.addEventListener("mouseover", ()=>{
        btn.style.backgroundColor = "green";
    })

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
